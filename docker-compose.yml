services:
  postgres:
    image: postgres:16-alpine
    container_name: friend-postgres
    environment:
      POSTGRES_DB: friend
      POSTGRES_USER: friend
      POSTGRES_PASSWORD: friend_dev_password
    ports:
      - "5432:5432"
    volumes:
      - friend-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friend -d friend"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  friend-postgres-data:
